version: "2"

services:
  api:
    build: ./battlesnake/src/
    ports:
      - "9001:5000"
    depends_on:
      - mongo

  bs-tester:
    build: ./bs-tester/src/
    ports:
      - "9002:5000"
    depends_on:
      - mongo

  mongo:
    image: mongo
    volumes:
      - battlesnake-data:/data/db
    expose:
      - "27017"

  mongo-express:
    image: mongo-express
    depends_on: 
      - mongo
    ports:
      - "8081:8081"

volumes:
  battlesnake-data:
